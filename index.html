<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шахматы с Эволюцией V2.6</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --board-dark: #7f8c8d;
            --board-light: #ecf0f1;
            --highlight: rgba(241, 196, 15, 0.6);
            --capture: rgba(231, 76, 60, 0.6);
            --special: rgba(52, 152, 219, 0.6); /* Синий цвет для спец. ходов */
            --immortal: rgba(142, 68, 173, 0.6); /* Фиолетовый для бессмертных */
            --white-piece: #fff;
            --black-piece: #000;
            --white-stroke: #000;
            --black-stroke: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; }
        .subtitle { color: #bdc3c7; margin-bottom: 20px; font-size: 0.9em; }

        .game-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Chess Board */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 5px solid #34495e;
            user-select: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            cursor: pointer;
            position: relative;
        }

        .cell.light { background-color: var(--board-light); }
        .cell.dark { background-color: var(--board-dark); }
        .cell.selected { background-color: var(--highlight) !important; }
        .cell.possible-move::after {
            content: '';
            width: 14px;
            height: 14px;
            background: rgba(0,0,0,0.25);
            border-radius: 50%;
        }
        .cell.capture { background-color: var(--capture) !important; }
        .cell.special-move { background-color: var(--special) !important; }

        /* Pieces */
        .piece {
            cursor: grab;
            transition: transform 0.2s;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%; height: 100%;
        }
        .piece.white { color: var(--white-piece); text-shadow: 0 0 2px var(--white-stroke); }
        .piece.black { color: var(--black-piece); text-shadow: 0 0 2px var(--black-stroke); }
        
        .piece.immortal { text-shadow: 0 0 5px #9b59b6; } /* Подсветка бессмертия */

        /* Tiers Effects */
        .piece.tier-2 { filter: drop-shadow(0 0 3px #3498db); }
        .piece.tier-3 { filter: drop-shadow(0 0 5px #f1c40f); font-size: 44px; }

        /* Level badges */
        .lvl-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 10px;
            background: rgba(0,0,0,0.8);
            color: #f1c40f;
            padding: 1px 4px;
            border-radius: 4px;
            pointer-events: none;
            font-weight: bold;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 8px;
        }

        .panel {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .turn-indicator {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .log {
            height: 200px;
            overflow-y: auto;
            font-size: 0.85em;
            font-family: monospace;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 5px;
            display: flex;
            flex-direction: column-reverse; /* Newest at bottom visually but scrolled */
        }

        /* Modal */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: #fff;
            color: #333;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border: 4px solid #f1c40f;
        }

        .modal-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .modal-card {
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 140px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .modal-card:hover {
            background: #fffdf0;
            transform: translateY(-5px);
            border-color: #f1c40f;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .modal-icon { font-size: 45px; display: block; margin-bottom: 10px; }
        .modal-name { font-weight: bold; display: block; margin-bottom: 5px; font-size: 1.1em;}
        .modal-desc { font-size: 0.8em; color: #555; line-height: 1.2; }

        button.reset-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Шахматы: Эволюция Фигур V2.6</h1>
    <div class="subtitle">made by shrechochek</div>

    <div class="game-container">
        <div id="board"></div>

        <div class="sidebar">
            <div class="panel">
                <div class="turn-indicator" id="turn-display">Ход: Белые</div>
                <div id="piece-info">Выберите фигуру...</div>
            </div>
            <div class="panel">
                <h3>Журнал событий</h3>
                <div class="log" id="game-log"></div>
            </div>
            <button class="reset-btn" onclick="initGame()">Новая игра</button>
        </div>
    </div>

    <!-- Universal Modal -->
    <div id="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">Заголовок</h2>
            <p id="modal-subtitle">Текст</p>
            <div class="modal-options" id="modal-container"></div>
        </div>
    </div>

<script>
/**
 * КОНФИГУРАЦИЯ
 */
const BOARD_SIZE = 8;

// Символы и Эмодзи
const SYMBOLS = {
    // Basic
    pawn: '♟', knight: '♞', bishop: '♝', rook: '♜', queen: '♛', king: '♚',
    // Tier 2
    spearman: '🔱', runner: '🏃', torpedo: '🐇',
    camel: '🐫', paladin: '🛡', knight_knight: '🤺',
    bomber: '💣', ghost: '👻', two_color_bishop: '☯️',
    tank: '🚜', car: '🏎', statue: '🗽',
    ring: '💍', crown: '👑',
    tnt: '🧨',
    // Tier 3
    spartan: '🏛', super_runner: '🧑‍🦽‍➡️',
    camel_knight: '👹', endless_knight: '🐴', moose: '🫎',
    nuke_bishop: '☢', sniper: '🔭', ship: '⛵️',
    fortress: '🏰', helicopter: '🚁', rocket: '🚀',
    unicorn: '🦄', pin: '📌'
};

// Векторы
const VEC_ORTHO = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
const VEC_DIAG = [{dx:1,dy:1},{dx:1,dy:-1},{dx:-1,dy:1},{dx:-1,dy:-1}];
const VEC_KNIGHT = [{dx:2,dy:1},{dx:2,dy:-1},{dx:-2,dy:1},{dx:-2,dy:-1},{dx:1,dy:2},{dx:1,dy:-2},{dx:-1,dy:2},{dx:-1,dy:-2}];
const VEC_CAMEL = [{dx:3,dy:1},{dx:3,dy:-1},{dx:-3,dy:1},{dx:-3,dy:-1},{dx:1,dy:3},{dx:1,dy:-3},{dx:-1,dy:3},{dx:-1,dy:-3}];

const move_audio = new Audio('sounds/move.mp3');
const capture_audio = new Audio('sounds/capture.mp3');


function slide(vectors) { return vectors.map(v => ({...v, slide: true})); }
function step(vectors) { return vectors.map(v => ({...v, slide: false})); }

/**
 * ОПРЕДЕЛЕНИЕ ТИПОВ
 */
const PIECE_TYPES = {
    // === TIER 1 ===
    'pawn': { name: 'Пешка', symbol: SYMBOLS.pawn, role: 'pawn', tier: 1, xpReq: 1 },
    'rook': { name: 'Ладья', symbol: SYMBOLS.rook, moves: slide(VEC_ORTHO), tier: 1, xpReq: 1, role: 'rook' },
    'knight': { name: 'Конь', symbol: SYMBOLS.knight, moves: step(VEC_KNIGHT), tier: 1, xpReq: 1 },
    'bishop': { name: 'Слон', symbol: SYMBOLS.bishop, moves: slide(VEC_DIAG), tier: 1, xpReq: 1 },
    'queen': { name: 'Ферзь', symbol: SYMBOLS.queen, moves: [...slide(VEC_ORTHO), ...slide(VEC_DIAG)], tier: 1, xpReq: 2 },
    'king': { name: 'Король', symbol: SYMBOLS.king, moves: [...step(VEC_ORTHO), ...step(VEC_DIAG)], tier: 1, xpReq: 1, role: 'king' },

    // === TIER 2 ===
    'pawn_runner': { name: 'бегун', desc: 'может ходить по диагонали вперед на одну клетку', symbol: SYMBOLS.runner, tier: 2, xpReq: 1, role: 'pawn', extraMoves: [{dx:1,dy:1},{dx:-1,dy:1}] },
    'pawn_spearman': { name: 'Копейщик', desc: 'бьет клетку перед собой', symbol: SYMBOLS.spearman, tier: 2, xpReq: 1, role: 'pawn', special: 'spear_attack' },
    'pawn_torpedo': { name: 'торпеда', desc: 'может ходить на две клетки вперед', symbol: SYMBOLS.torpedo, tier: 2, xpReq: 1, role: 'pawn', extraMoves: [{dx:0,dy:2}] },

    'knight_camel': { name: 'Верблюд', desc: 'ходит (3+1)', symbol: SYMBOLS.camel, tier: 2, xpReq: 2, moves: step(VEC_CAMEL) },
    'knight_paladin': { name: 'Паладин', desc: 'ходит как конь, плюс одна клетка по горизонтали и вертикали', symbol: SYMBOLS.paladin, tier: 2, xpReq: 2, moves: [...step(VEC_KNIGHT), ...step(VEC_DIAG)] },
    'knight_knight': { name: 'рыцарь', desc: 'ходит как конь, плюс одна клетка по диагонали', symbol: SYMBOLS.knight_knight, tier: 2, xpReq: 1, moves: [...step(VEC_KNIGHT), ...step(VEC_ORTHO)] },

    'bishop_bomber': { name: 'Бомбардир', desc: 'взрывается(3x3) при съедении', symbol: SYMBOLS.bomber, tier: 2, xpReq: 2, moves: slide(VEC_DIAG), special: 'detonate_3' }, 
    'bishop_ghost': { name: 'Призрак', desc: 'проходит через 1 фигуру', symbol: SYMBOLS.ghost, tier: 2, xpReq: 2, moves: slide(VEC_DIAG), ghost: 1 }, // Теперь ghost принимает число
    'two_color_bishop': { name: 'двухцветный слон', desc: 'слон + король', symbol: SYMBOLS.two_color_bishop, tier: 2, xpReq: 1, moves: [...slide(VEC_DIAG), ...step(VEC_ORTHO), ...step(VEC_DIAG)] },

    'rook_tank': { name: 'Танк', desc: 'ладья + король', symbol: SYMBOLS.tank, tier: 2, xpReq: 2, moves: [...slide(VEC_ORTHO), ...step(VEC_DIAG)] },
    'rook_ghost': { name: 'Призрак', desc: 'проходит через 2 фигуры', symbol: SYMBOLS.car, tier: 2, xpReq: 2, moves: [...slide(VEC_ORTHO)], ghost: 1 },
    'statue': { name: 'статуя', desc: 'Неуязвима. Телепортируется на любую свободную клетку.', symbol: SYMBOLS.statue, tier: 2, xpReq: 999, moves:[], immortal: true, special: 'teleport' },

    'queen_camel': { name: 'королева верблюдов', desc: 'королева + верблюд', symbol: SYMBOLS.ring, tier: 2, xpReq: 4, moves: [...slide(VEC_ORTHO), ...slide(VEC_DIAG), ...step(VEC_CAMEL)] },
    'queen_knight': { name: 'королева коней', desc: 'королева + конь', symbol: SYMBOLS.crown, tier: 2, xpReq: 4, moves: [...slide(VEC_ORTHO), ...slide(VEC_DIAG), ...step(VEC_KNIGHT)] },
    'queen_upgradeable': { name: 'королева v2', desc: 'королева, которая эволюционирует дальше', symbol: SYMBOLS.queen, tier: 1, xpReq: 1, moves: [...slide(VEC_ORTHO), ...slide(VEC_DIAG)] },

    'king_dead_end': { name: 'король без эволюции', desc: 'обычный король', symbol: SYMBOLS.king, tier: 1, xpReq: 999, moves: [...step(VEC_ORTHO), ...step(VEC_DIAG)], role: 'king'  },
    'king_nuke': { name: 'ядерный король', desc: 'взрывается(5x5) когда съедает или съеден', symbol: SYMBOLS.tnt, tier: 1, xpReq: 999, moves: [...step(VEC_ORTHO), ...step(VEC_DIAG)], special: 'explode_5', role: 'king'  },

    // === TIER 3 ===
    'pawn_spartan': { name: 'Спартанец', desc: 'копейщик + бегун', symbol: SYMBOLS.spartan, tier: 3, xpReq: 1, role: 'pawn', extraMoves: [{dx:1,dy:1},{dx:-1,dy:1}], special: 'spear_attack' },
    'pawn_superrunner': { name: 'супер бегун', desc: 'ходит как король', symbol: SYMBOLS.super_runner, tier: 3, xpReq: 1, role: 'pawn', extraMoves: [{dx:1,dy:1},{dx:-1,dy:1},{dx:1,dy:0},{dx:-1,dy:0},{dx:-1,dy:-1},{dx:1,dy:-1},{dx:0,dy:-1}] },

    'knight_camel_hybrid': { name: 'Коне-Верблюд', desc: 'конь + верблюд', symbol: SYMBOLS.camel_knight, tier: 3, xpReq: 999, moves: [...step(VEC_KNIGHT), ...step(VEC_CAMEL)] },
    'knight_endless': { name: 'беконечный конь', desc: 'конь без ограничения радиуса', symbol: SYMBOLS.endless_knight, tier: 3, xpReq: 999, moves: [...slide(VEC_KNIGHT)], ghost: 10 }, // true = Infinity
    'knight_king': { name: 'король коней', desc: 'конь + король', symbol: SYMBOLS.moose, tier: 3, xpReq: 999, moves: [...step(VEC_KNIGHT), ...step(VEC_ORTHO), ...step(VEC_DIAG)] },

    'bishop_nuke': { name: 'Ядерный Слон', desc: 'взрывается(3x3) когда съедает или съеден', symbol: SYMBOLS.nuke_bishop, tier: 3, xpReq: 999, moves: slide(VEC_DIAG), special: 'explode_3' },
    'bishop_sniper': { name: 'Снайпер', desc: 'проходит через 2 фигуры', symbol: SYMBOLS.sniper, tier: 3, xpReq: 999, moves: [...slide(VEC_DIAG)], ghost: 2 },
    'bishop_ship': { name: 'корабль', desc: 'конь + слон', symbol: SYMBOLS.ship, tier: 3, xpReq: 999, moves: [...step(VEC_KNIGHT), ...slide(VEC_DIAG)] },

    'rook_helicopter': { name: 'вертолет', desc: 'ладья + конь', symbol: SYMBOLS.helicopter, tier: 2, xpReq: 2, moves: [...slide(VEC_ORTHO), ...step(VEC_KNIGHT)] },
    'rook_sniper':  { name: 'ракета', desc: 'проходит через 2 фигуры', symbol: SYMBOLS.rocket, tier: 3, xpReq: 999, moves: [...slide(VEC_ORTHO)], ghost: 2 },

    'queen_knight_camel': { name: 'ультимативная королева', desc: 'королева + конь + верблюд', symbol: SYMBOLS.unicorn, tier: 3, xpReq: 999, moves: [...slide(VEC_ORTHO), ...slide(VEC_DIAG), ...step(VEC_KNIGHT), ...step(VEC_CAMEL)] },
    'queen_ghost': { name: 'призрак', desc: 'проходит через 2 фигуры', symbol: SYMBOLS.pin, tier: 3, xpReq: 999, moves: [...slide(VEC_ORTHO), ...slide(VEC_DIAG)], ghost : 2 },
    'quuen_range': { name: 'дальняя королева', desc: 'дальняя атака', symbol: SYMBOLS.pin, tier: 3, xpReq: 999, moves: [...slide(VEC_ORTHO), ...slide(VEC_DIAG)], special: 'range_capture'}
};

/**
 * ДЕРЕВО ЭВОЛЮЦИИ
 */
const EVOLUTION_TREE = {
    'pawn': ['pawn_runner', 'pawn_spearman', 'pawn_torpedo'],
    'knight': ['knight_camel', 'knight_paladin', 'knight_knight'],
    'bishop': ['bishop_bomber', 'bishop_ghost', 'two_color_bishop'],
    'rook': ['rook_tank', 'rook_ghost', 'statue'],
    'queen': ['queen_camel', 'queen_knight', 'queen_upgradeable'], 
    'king': ['king_nuke', 'king_dead_end'],

    'pawn_runner': ['pawn_superrunner', 'pawn_spartan'],
    'pawn_spearman': ['pawn_spartan'],
    
    'knight_camel': ['knight_camel_hybrid', 'knight_endless'],
    'knight_paladin': ['knight_king', 'rook'],
    'knight_knight': ['knight_king', 'rook', 'bishop_ship'],

    'two_color_bishop': ['rook', 'bishop_ship'],
    'bishop_bomber': ['bishop_nuke'],
    'bishop_ghost': ['bishop_sniper'],

    'rook_tank': ['rook_helicopter', 'queen'],

    'queen_camel': ['queen_knight_camel'],
    'queen_knight': ['queen_knight_camel'],
    'queen_upgradeable': ['king', 'queen_ghost', 'quuen_range'],

    'pawn_superrunner': ['knight'],
    'pawn_spartan': ['bishop']
};

// Глобальное состояние
let board = [];
let currentTurn = 'white';
let selectedCell = null;
let possibleMoves = [];
let gameOver = false;
let enPassantTarget = null; // {x, y} или null

let white_kings = 1;
let black_kings = 1;

// --- Инициализация ---

function initGame() {
    board = createBoard();
    currentTurn = 'white';
    selectedCell = null;
    gameOver = false;
    possibleMoves = [];
    enPassantTarget = null;
    document.getElementById('game-log').innerHTML = '';
    log('Новая игра!');
    renderBoard();
    updateInfo();
}

function createBoard() {
    const newBoard = Array(8).fill(null).map(() => Array(8).fill(null));
    
    for(let x=0; x<8; x++) {
        newBoard[1][x] = createPiece('pawn', 'black');
        newBoard[6][x] = createPiece('pawn', 'white');
    }

    const backRow = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
    backRow.forEach((type, x) => {
        newBoard[0][x] = createPiece(type, 'black');
        newBoard[7][x] = createPiece(type, 'white');
    });

    return newBoard;
}

function createPiece(type, color) {
    return {
        type: type,
        color: color,
        xp: 0,
        hasMoved: false,
        id: Math.random().toString(36).substr(2, 9)
    };
}

// --- Логика движения ---

function getValidMoves(piece, startX, startY, checkBoard = board) {
    const moves = [];
    const def = PIECE_TYPES[piece.type];
    const isWhite = piece.color === 'white';
    const direction = isWhite ? -1 : 1;

    // 0. СПЕЦ-СПОСОБНОСТЬ: ТЕЛЕПОРТ (СТАТУЯ)
    if (def.special === 'teleport') {
        for(let y=0; y<8; y++) {
            for(let x=0; x<8; x++) {
                // Можно прыгать только на пустые клетки
                if (!checkBoard[y][x]) {
                    moves.push({x, y});
                }
            }
        }
        // Статуя не имеет других ходов, кроме телепорта (moves: [])
        return moves; 
    }

    // 1. Логика Пешек
    if (def.role === 'pawn') {
        // Обычный шаг
        let dy = direction;
        if (isValidPos(startX, startY + dy) && !checkBoard[startY + dy][startX]) {
            moves.push({x: startX, y: startY + dy});
            // Double move
            if (!piece.hasMoved && isValidPos(startX, startY + dy * 2) && !checkBoard[startY + dy * 2][startX]) {
                moves.push({x: startX, y: startY + dy * 2, isDoublePawnMove: true});
            }
        }

        // Атака + Взятие на проходе
        [[-1, dy], [1, dy]].forEach(att => {
            const tx = startX + att[0];
            const ty = startY + att[1];
            if (isValidPos(tx, ty)) {
                const target = checkBoard[ty][tx];
                // Обычная атака (Проверка на бессмертие target происходит здесь)
                if (target && target.color !== piece.color) {
                    if (!PIECE_TYPES[target.type].immortal) {
                         moves.push({x: tx, y: ty, isCapture: true});
                    }
                }
                // Взятие на проходе (En Passant)
                else if (!target && enPassantTarget && enPassantTarget.x === tx && enPassantTarget.y === ty) {
                     moves.push({x: tx, y: ty, isCapture: true, isEnPassant: true});
                }
            }
        });

        // Спец-атаки пешек (Копейщик)
        if (def.special === 'spear_attack') {
            const forwardY = startY + direction;
            if (isValidPos(startX, forwardY)) {
                const target = checkBoard[forwardY][startX];
                if (target && target.color !== piece.color) {
                     if (!PIECE_TYPES[target.type].immortal) {
                         moves.push({x: startX, y: forwardY, isCapture: true});
                     }
                }
            }
        }

        if (def.extraMoves) {
            def.extraMoves.forEach(m => {
                const actualDy = m.dy * direction; 
                const tx = startX + m.dx;
                const ty = startY + actualDy;
                if (isValidPos(tx, ty) && !checkBoard[ty][tx]) {
                    moves.push({x: tx, y: ty});
                }
            });
        }
    }

    // 2. Стандартные ходы (Слайдеры и Шаги)
    if (def.moves) {
        def.moves.forEach(vec => {
            const dx = vec.dx;
            const dy = vec.dy;
            
            if (vec.slide) {
                // ЛОГИКА СЛАЙДА С УЧЕТОМ ПРИЗРАКА (Числовой лимит)
                let obstaclesPassed = 0;
                // Если ghost === true (старый формат), считаем как Infinity. Иначе берем число или 0.
                const ghostLimit = (def.ghost === true) ? Infinity : (def.ghost || 0);

                for (let i = 1; i < 8; i++) {
                    const tx = startX + (dx * i);
                    const ty = startY + (dy * i);
                    if (!isValidPos(tx, ty)) break;
                    
                    const target = checkBoard[ty][tx];
                    
                    if (!target) {
                        moves.push({x: tx, y: ty});
                    } else {
                        // Если встретили фигуру:
                        // 1. Можем ли мы её съесть?
                        if (target.color !== piece.color) {
                            // Если не бессмертная - добавляем как ход взятия
                            if (!PIECE_TYPES[target.type].immortal) {
                                moves.push({x: tx, y: ty, isCapture: true});
                            }
                        }
                        
                        // 2. Можем ли мы пройти сквозь неё дальше?
                        obstaclesPassed++;
                        if (obstaclesPassed > ghostLimit) {
                            break; // Лимит прохода исчерпан
                        }
                    }
                }
            } else {
                // ЛОГИКА ШАГА (Прыжок)
                const tx = startX + dx;
                const ty = startY + dy;
                if (isValidPos(tx, ty)) {
                    const target = checkBoard[ty][tx];
                    if (!target) {
                        moves.push({x: tx, y: ty});
                    } else if (target.color !== piece.color) {
                        if (!PIECE_TYPES[target.type].immortal) {
                            moves.push({x: tx, y: ty, isCapture: true});
                        }
                    }
                }
            }
        });
    }

    // 3. РОКИРОВКА (Castling)
    if (def.role === 'king' && !piece.hasMoved) {
        const row = isWhite ? 7 : 0;
        
        // Короткая (KingSide)
        const kRook = checkBoard[row][7];
        if (kRook && PIECE_TYPES[kRook.type].role === 'rook' && !kRook.hasMoved) {
            if (!checkBoard[row][5] && !checkBoard[row][6]) {
                moves.push({x: 6, y: row, isCastling: true, rookX: 7, rookToX: 5});
            }
        }
        
        // Длинная (QueenSide)
        const qRook = checkBoard[row][0];
        if (qRook && PIECE_TYPES[qRook.type].role === 'rook' && !qRook.hasMoved) {
            if (!checkBoard[row][1] && !checkBoard[row][2] && !checkBoard[row][3]) {
                moves.push({x: 2, y: row, isCastling: true, rookX: 0, rookToX: 3});
            }
        }
    }

    return moves;
}

function isValidPos(x, y) {
    return x >= 0 && x < 8 && y >= 0 && y < 8;
}

// --- Взаимодействие ---

function cellClick(x, y) {
    if (gameOver) return;

    const clickedPiece = board[y][x];
    const move = possibleMoves.find(m => m.x === x && m.y === y);

    if (move) {
        makeMove(selectedCell.x, selectedCell.y, move);
        return;
    }

    if (clickedPiece && clickedPiece.color === currentTurn) {
        selectedCell = {x, y};
        possibleMoves = getValidMoves(clickedPiece, x, y);
        renderBoard();
        updateInfo(clickedPiece);
    } else {
        selectedCell = null;
        possibleMoves = [];
        renderBoard();
        updateInfo(null);
    }
}

function makeMove(fromX, fromY, move) {
    const toX = move.x;
    const toY = move.y;
    const piece = board[fromY][fromX];
    let target = board[toY][toX];
    
    let captureHappened = false;
    let enemyType = null;

    let explosion = false;

    // ОБРАБОТКА ВЗЯТИЯ НА ПРОХОДЕ
    if (move.isEnPassant) {
        const dir = piece.color === 'white' ? 1 : -1; 
        const capturedPawnY = toY + dir;
        target = board[capturedPawnY][toX]; 
        board[capturedPawnY][toX] = null; 
        captureHappened = true;
        log('⚔️ Взятие на проходе!');
    }
    // log('test1');

    if (target) {
        // log(PIECE_TYPES[target.type].role)
        capture_audio.play();
        captureHappened = true;
        enemyType = target.type;
        piece.xp += 1;
        
        if (PIECE_TYPES[target.type].role === 'king') {
            if(target.color === 'white') {
                white_kings -= 1;
            }
            else {
                black_kings -= 1;
            }

            if (white_kings === 0) {
                alert(`Победа черных!`);
                gameOver = true;
                if(PIECE_TYPES[target.type].special !== 'range_capture') {
                    board[toY][toX] = piece;
                    board[fromY][fromX] = null;
                }
                else {
                    board[toY][toX] = null;
                }
                renderBoard();
                return;
            }
            else if (black_kings === 0) {
                alert(`Победа белых!`);
                gameOver = true;
                if(PIECE_TYPES[target.type].special !== 'range_capture') {
                    board[toY][toX] = piece;
                    board[fromY][fromX] = null;
                }
                else {
                    board[toY][toX] = null;
                }
                renderBoard();
                return;
            }
        }
        
        if (PIECE_TYPES[target.type].special === 'explode_3') {
            const radius = PIECE_TYPES[target.type].special === 'explode_5' ? 2 : 1; 
            explode(toX, toY, board[toY][toX].color, radius);
            explosion = true;
            log('boom!!!!!');
        }
        else if (PIECE_TYPES[target.type].special === 'detonate_3') {
            const radius = PIECE_TYPES[target.type].special === 'detonate_5' ? 2 : 1; 
            explode(toX, toY, board[toY][toX].color, radius);
            explosion = true;
            log('boom!!!!!');
        }
        else if (PIECE_TYPES[target.type].special === 'explode_5') {
            const radius = PIECE_TYPES[target.type].special === 'explode_5' ? 2 : 1; 
            explode(toX, toY, board[toY][toX].color, radius);
            explosion = true;
            log('boom!!!!!');
        }
        else if (PIECE_TYPES[target.type].special === 'detonate_5') {
            const radius = PIECE_TYPES[target.type].special === 'detonate_5' ? 2 : 1; 
            explode(toX, toY, board[toY][toX].color, radius);
            explosion = true;
            log('boom!!!!!');
        }
    }

    else {
        move_audio.play();
    }

    // log('test2');
    log(PIECE_TYPES[piece.type].special);
    log(target)

    // ПЕРЕМЕЩЕНИЕ ФИГУРЫ
    if(target)
    { //дальняя атака или взрыв
        if(PIECE_TYPES[piece.type].special === 'range_capture' || explosion) {
            board[toY][toX] = null;
        }
        else {
            board[toY][toX] = piece;
        }
    }
    else {
        board[toY][toX] = piece;
    }

    // log('test3');
    // if(!(target & PIECE_TYPES[piece.type].special !== 'range_capture')) {
    //     board[fromY][fromX] = null;
    // }
    if(PIECE_TYPES[piece.type].special !== 'range_capture') {
        board[fromY][fromX] = null;
    }
    else if(!target) {
        board[fromY][fromX] = null;
    }
    log(fromY);
    log(fromX);
    piece.hasMoved = true;

    // РОКИРОВКА (Перемещение ладьи)
    if (move.isCastling) {
        const rook = board[toY][move.rookX];
        board[toY][move.rookToX] = rook;
        board[toY][move.rookX] = null;
        rook.hasMoved = true;
        log('🔄 Рокировка!');
    }

    // Установка флага En Passant на следующий ход
    if (move.isDoublePawnMove) {
        const dir = piece.color === 'white' ? -1 : 1;
        enPassantTarget = { x: toX, y: toY - dir }; 
    } else {
        enPassantTarget = null;
    }

    // ПРЕВРАЩЕНИЕ ПЕШКИ (Promotion)
    const def = PIECE_TYPES[piece.type];
    const isAtEnd = (piece.color === 'white' && toY === 0) || (piece.color === 'black' && toY === 7);
    
    if (def.role === 'pawn' && isAtEnd) {
        renderBoard();
        showPromotionModal(piece);
        return; 
    }

    // XP & Evolve
    if (captureHappened && enemyType) {
        log(`${def.symbol} ${def.name} рубит ${PIECE_TYPES[enemyType].name} (+1 XP)`);
        if (def.special && def.special.startsWith('explode')) {
            const radius = def.special === 'explode_5' ? 2 : 1; 
            explode(toX, toY, piece.color, radius);
        }
    }

    if (canEvolve(piece)) {
        renderBoard();
        showEvolutionModal(piece);
        return; 
    }

    endTurn();
}

function endTurn() {
    selectedCell = null;
    possibleMoves = [];
    currentTurn = currentTurn === 'white' ? 'black' : 'white';
    renderBoard();
    
    const turnText = document.getElementById('turn-display');
    turnText.innerText = `Ход: ${currentTurn === 'white' ? 'Белые' : 'Черные'}`;
    turnText.style.color = currentTurn === 'white' ? '#fff' : '#aaa';
}

function explode(cx, cy, attackerColor, radius) {
    log(`💥 ВЗРЫВ (Радиус ${radius})!`);
    for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
            if (dx===0 && dy===0) continue;
            const tx = cx + dx;
            const ty = cy + dy;
            if (isValidPos(tx, ty)) {
                const victim = board[ty][tx];
                // Бессмертные фигуры выживают при взрыве (кроме королей, у которых логика отдельная)
                if (victim && victim.type !== 'king' && !PIECE_TYPES[victim.type].immortal) { 
                    const isNuke = radius > 1;
                    if (isNuke || victim.color !== attackerColor) {
                        board[ty][tx] = null;
                    }
                }
            }
        }
    }
}

// --- Модальные окна (Эволюция и Превращение) ---

function showModal(title, text, items, callback) {
    const overlay = document.getElementById('modal-overlay');
    const container = document.getElementById('modal-container');
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-subtitle').innerText = text;
    container.innerHTML = '';

    items.forEach(item => {
        const def = PIECE_TYPES[item];
        const card = document.createElement('div');
        card.className = `modal-card ${def.tier === 3 ? 'tier-3-card' : ''}`;
        card.innerHTML = `
            <span class="modal-icon">${def.symbol}</span>
            <span class="modal-name">${def.name}</span>
            <span class="modal-desc">${def.desc || ''}</span>
        `;
        card.onclick = () => {
            overlay.style.display = 'none';
            callback(item);
        };
        container.appendChild(card);
    });

    overlay.style.display = 'flex';
}

// Эволюция
function canEvolve(piece) {
    const evolutions = EVOLUTION_TREE[piece.type];
    if (!evolutions || evolutions.length === 0) return false;
    const def = PIECE_TYPES[piece.type];
    return piece.xp >= def.xpReq;
}

function showEvolutionModal(piece) {
    const options = EVOLUTION_TREE[piece.type];
    showModal('Эволюция!', 'Ваша фигура мутирует.', options, (newType) => {
        piece.type = newType;
        if(piece.type === "king") {
            if(currentTurn === "white") {
                white_kings += 1
            }
            else {
                black_kings += 1
            }
        }
        piece.xp = 0;
        log(`🧬 Эволюция завершена!`);
        endTurn();
    });
}

// Превращение пешки
function showPromotionModal(piece) {
    const options = ['queen', 'rook', 'bishop', 'knight']; // Стандартный набор
    showModal('Превращение!', 'Пешка дошла до края.', options, (newType) => {
        piece.type = newType;
        piece.xp = 0;
        piece.hasMoved = true; 
        log(`🎖 Превращение в ${PIECE_TYPES[newType].name}!`);
        endTurn();
    });
}


// --- Рендеринг ---

function renderBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';

    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
            const cell = document.createElement('div');
            cell.className = `cell ${(x + y) % 2 === 0 ? 'light' : 'dark'}`;
            cell.onclick = () => cellClick(x, y);

            const move = possibleMoves.find(m => m.x === x && m.y === y);
            if (move) {
                cell.classList.add('possible-move');
                if (board[y][x] || move.isCapture) cell.classList.add('capture');
                if (move.isCastling || move.isEnPassant) cell.classList.add('special-move');
            }
            if (selectedCell && selectedCell.x === x && selectedCell.y === y) {
                cell.classList.add('selected');
            }

            const piece = board[y][x];
            if (piece) {
                const pieceEl = document.createElement('div');
                const def = PIECE_TYPES[piece.type];
                pieceEl.className = `piece ${piece.color} tier-${def.tier}`;
                
                // Подсветка бессмертия
                if (def.immortal) pieceEl.classList.add('immortal');

                pieceEl.innerText = def.symbol;
                
                if (piece.xp > 0) {
                    const badge = document.createElement('span');
                    badge.className = 'lvl-badge';
                    badge.innerText = `${piece.xp}/${def.xpReq}`;
                    pieceEl.appendChild(badge);
                }
                
                cell.appendChild(pieceEl);
            }
            boardEl.appendChild(cell);
        }
    }
}

function updateInfo(piece) {
    const infoPanel = document.getElementById('piece-info');
    if (!piece) {
        infoPanel.innerText = "Нажмите на фигуру для инфо...";
        return;
    }

    const def = PIECE_TYPES[piece.type];
    const nextEvos = EVOLUTION_TREE[piece.type] || [];
    const hasEvo = nextEvos.length > 0;
    
    let immortalBadge = def.immortal ? '<span style="font-size:0.6em; background:#9b59b6; color:#fff; padding:2px 5px; border-radius:4px; margin-left:5px;">Бессмертный</span>' : '';

    infoPanel.innerHTML = `
        <div style="font-size: 1.4em; margin-bottom:5px;">${def.symbol} <strong>${def.name}</strong> <span style="font-size:0.6em; background:#f1c40f; color:#000; padding:2px 5px; border-radius:4px;">Tier ${def.tier}</span>${immortalBadge}</div>
        <div style="font-size: 0.9em; color: #ccc; margin-bottom: 10px;">${def.desc || ''}</div>
        
        ${hasEvo ? 
            `Прогресс: <b>${piece.xp} / ${def.xpReq}</b> XP<br>
            <small style="color:#aaa">Далее: ${nextEvos.map(t => PIECE_TYPES[t].name).join(', ')}</small>` 
            : 
            `<b style="color:#f1c40f">МАКСИМАЛЬНЫЙ УРОВЕНЬ</b>`
        }
    `;
}

function log(msg) {
    const logEl = document.getElementById('game-log');
    const entry = document.createElement('div');
    entry.innerHTML = `> ${msg}`;
    entry.style.padding = "2px 0";
    entry.style.borderBottom = "1px solid rgba(255,255,255,0.05)";
    logEl.prepend(entry); 
}

initGame();

</script>
